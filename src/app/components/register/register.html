<div class="auth-page">
  <div class="auth-card card fade-in-up">

    <div class="auth-header">
      <span class="auth-icon">🫘</span>
      <h1>Start your log</h1>
      <p>Create your free coffee journal</p>
    </div>

    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          class="form-control"
          placeholder="coffeelover99"
          [value]="username"
          (input)="username = $any($event.target).value"
          name="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          class="form-control"
          placeholder="your@email.com"
          [value]="email"
          (input)="email = $any($event.target).value"
          name="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-control"
          placeholder="At least 6 characters"
          [value]="password"
          (input)="password = $any($event.target).value"
          name="password"
          required
        />
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input
          id="confirm"
          type="password"
          class="form-control"
          placeholder="••••••••"
          [value]="confirm"
          (input)="confirm = $any($event.target).value"
          name="confirm"
          required
        />
      </div>

      <button
        type="submit"
        class="btn btn-primary w-full"
        [disabled]="loading"
      >
        @if (loading) {
          <span class="spinner"></span>
        }
        @if (!loading) {
          <span>Create Account ✨</span>
        }
      </button>

    </form>

    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login">Log in</a>
    </p>

  </div>
</div>
