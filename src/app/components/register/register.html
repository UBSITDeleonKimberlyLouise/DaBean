<div class="auth-page">
  <div class="auth-card card fade-in-up">

    <div class="auth-header">
      <span class="auth-icon">🫘</span>
      <h1>Start your log</h1>
      <p>Create your free coffee journal</p>
    </div>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="onSubmit()" #regForm="ngForm" novalidate>

      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          class="form-control"
          placeholder="coffeelover99"
          [(ngModel)]="username"
          name="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          class="form-control"
          placeholder="your@email.com"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-control"
          placeholder="At least 6 characters"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input
          id="confirm"
          type="password"
          class="form-control"
          placeholder="••••••••"
          [(ngModel)]="confirm"
          name="confirm"
          required
        />
      </div>

      <button
        type="submit"
        class="btn btn-primary w-full"
        [disabled]="loading"
      >
        <span *ngIf="loading" class="spinner"></span>
        <span *ngIf="!loading">Create Account ✨</span>
      </button>

    </form>

    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login">Log in</a>
    </p>

  </div>
</div>
