<div class="auth-page">
  <div class="auth-card card fade-in-up">

    <div class="auth-header">
      <span class="auth-icon">☕</span>
      <h1>Add a Log</h1>
      <p>Record your cafe visit to the community</p>
    </div>

    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label for="cafe_name">Cafe Name</label>
        <input
          id="cafe_name"
          type="text"
          class="form-control"
          placeholder="e.g. Foam Coffee"
          [value]="cafe_name"
          (input)="cafe_name = $any($event.target).value"
          name="cafe_name"
          required
        />
      </div>

      <div class="form-group">
        <label for="rating">Rating</label>
        <select
          id="rating"
          class="form-control"
          [value]="rating"
          (change)="rating = +$any($event.target).value"
          name="rating"
          required
        >
          <option value="5">★★★★★ 5</option>
          <option value="4">★★★★☆ 4</option>
          <option value="3">★★★☆☆ 3</option>
          <option value="2">★★☆☆☆ 2</option>
          <option value="1">★☆☆☆☆ 1</option>
        </select>
      </div>

      <div class="form-group">
        <label for="review_text">Review</label>
        <textarea
          id="review_text"
          class="form-control"
          placeholder="How was it?"
          rows="3"
          [value]="review_text"
          (input)="review_text = $any($event.target).value"
          name="review_text"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="best_dish">Best Dish</label>
        <input
          id="best_dish"
          type="text"
          class="form-control"
          placeholder="e.g. Matcha Latte"
          [value]="best_dish"
          (input)="best_dish = $any($event.target).value"
          name="best_dish"
        />
      </div>

      <div class="form-group">
        <label for="date_visited">Date Visited</label>
        <input
          id="date_visited"
          type="date"
          class="form-control"
          [value]="date_visited"
          (input)="date_visited = $any($event.target).value"
          name="date_visited"
        />
      </div>

      <div class="form-group">
        <label for="companions">Who were you with?</label>
        <input
          id="companions"
          type="text"
          class="form-control"
          placeholder="e.g. Solo, Friends, Date"
          [value]="companions"
          (input)="companions = $any($event.target).value"
          name="companions"
        />
      </div>

      <button
        type="submit"
        class="btn btn-primary w-full"
        [disabled]="loading"
      >
        @if (loading) {
          <span class="spinner"></span>
        }
        @if (!loading) {
          <span>Save Log ☕</span>
        }
      </button>

    </form>

    <p class="auth-footer">
      <a routerLink="/dashboard">← Back to Discover</a>
    </p>

  </div>
</div>
