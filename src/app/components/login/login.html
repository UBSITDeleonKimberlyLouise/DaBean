<div class="auth-page">
  <div class="auth-card card fade-in-up">

    <div class="auth-header">
      <span class="auth-icon">☕</span>
      <h1>Welcome back</h1>
      <p>Log in to your coffee journal</p>
    </div>

    @if (error) {
      <div class="alert alert-error">
        {{ error }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          class="form-control"
          placeholder="your@email.com"
          (input)="email = $any($event.target).value"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-control"
          placeholder="••••••••"
          (input)="password = $any($event.target).value"
          required
        />
      </div>

      <button
        type="submit"
        class="btn btn-primary w-full"
        [disabled]="loading"
      >
        @if (loading) {
          <span class="spinner"></span>
        } @else {
          <span>Log In ☕</span>
        }
      </button>

    </form>

    <p class="auth-footer">
      Don't have an account?
      <a routerLink="/register">Sign up free</a>
    </p>

  </div>
</div>
